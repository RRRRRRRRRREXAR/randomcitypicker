services:
  backend:
    image: golang:1.26-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - db_data:/data
      - go_mod:/go/pkg/mod
    environment:
      - DB_PATH=/data/cities.db
    working_dir: /app
    command: sh -c "go mod tidy && go run ."

  frontend:
    image: node:20-alpine
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8080
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  db_data:
  go_mod:
