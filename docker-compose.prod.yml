services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/cities.db
      - SEED_COUNTRIES=FR,MX,US

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  db_data:
